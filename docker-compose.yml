services:
  node_exporter:
    image: quay.io/prometheus/node-exporter:v1.9.1
    container_name: ${COMPOSE_PROJECT_NAME}-node_exporter
    command:
      - --web.listen-address=:9100
      - --path.rootfs=/host
    network_mode: host
    pid: host
    volumes:
      - /:/host:ro,rslave
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9100/metrics"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    profiles:
      - full
      - monitoring
      - no-grafana
      # Exclude from wsl profile - requires real Linux host filesystem

  # postgres_exporter:
