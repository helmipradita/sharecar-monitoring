  promtail:
    image: grafana/promtail:3.4.0
    container_name: ${COMPOSE_PROJECT_NAME}-promtail
    entrypoint:
      - /bin/bash
      - -c
      - |
        sed "s#\$${SERVER_ENV}#$$SERVER_ENV#g; s#\$${SERVER_NAME}#$$SERVER_NAME#g" \
          /etc/promtail/promtail-config.yml.template > /etc/promtail/promtail-config.yml
        exec /bin/promtail --config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/promtail-config.yml.template:ro
      - ${LOG_PATH_CORE_API}:/var/log/sharecar-core-api:ro
      - ${LOG_PATH_MOBILE_API}:/var/log/sharecar-mobile-api:ro
      - ${LOG_PATH_SYSLOG}:/var/log/syslog:ro
    environment:
      - SERVER_ENV=${SERVER_ENV}
      - SERVER_NAME=${SERVER_NAME}
    ports:
      - "${PROMTAIL_PORT}:9080"
    healthcheck:
      test: ["CMD", "/bin/bash", "-c", "exec 3<>/dev/tcp/localhost/9080 && echo -e 'GET /ready HTTP/1.0\\r\\n' >&3 && cat <&3 | head -n1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    profiles:
      - full
      - monitoring
      - no-grafana
      # Exclude from wsl profile - requires host log paths

  loki:
    image: grafana/loki:3.4.0
    container_name: ${COMPOSE_PROJECT_NAME}-loki
    ports:
      - "${LOKI_PORT}:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    profiles:
      - full
      - monitoring
      - no-grafana

  prometheus:
    image: prom/prometheus:v3.4.0
    container_name: ${COMPOSE_PROJECT_NAME}-prometheus
    entrypoint:
      - /bin/sh
      - -c
      - |
        sed "s#\$${SERVER_ENV}#$$SERVER_ENV#g; s#\$${SERVER_NAME}#$$SERVER_NAME#g" \
          /etc/prometheus/prometheus.yml.template > /etc/prometheus/prometheus.yml
        exec /bin/prometheus --web.enable-remote-write-receiver --config.file=/etc/prometheus/prometheus.yml
    ports:
      - "${PROMETHEUS_PORT}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml.template:ro
      - prometheus-data:/prometheus
    environment:
      - SERVER_ENV=${SERVER_ENV}
      - SERVER_NAME=${SERVER_NAME}
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    profiles:
      - full
      - no-grafana

  grafana:
    image: grafana/grafana:11.5.2
    container_name: ${COMPOSE_PROJECT_NAME}-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=${GF_USERS_ALLOW_SIGN_UP}
    ports:
      - "${GRAFANA_PORT}:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    profiles:
      - full
    depends_on:
      - prometheus
      - loki

  # nginx - Approach A (all services via path)
  # Disabled - using Approach B (nginx-b) instead
  # nginx:
  #   image: nginx:1.27-alpine
  #   container_name: ${COMPOSE_PROJECT_NAME}-nginx
  #   ports:
  #     - "${EXTERNAL_PORT}:80"
  #   volumes:
  #     - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  #   restart: unless-stopped
  #   profiles:
  #     - full

  nginx-b:
    image: nginx:1.27-alpine
    container_name: ${COMPOSE_PROJECT_NAME}-nginx-b
    ports:
      - "${EXTERNAL_PORT}:80"
    volumes:
      - ./nginx/nginx-approach-b.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD", "/bin/sh", "-c", "kill -0 1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    profiles:
      - full

volumes:
  prometheus-data:
    name: ${COMPOSE_PROJECT_NAME}-prometheus-data
  loki-data:
    name: ${COMPOSE_PROJECT_NAME}-loki-data
  grafana-data:
    name: ${COMPOSE_PROJECT_NAME}-grafana-data

networks:
  default:
    name: ${COMPOSE_PROJECT_NAME}-network