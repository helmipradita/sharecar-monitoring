global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    server: '${SERVER_NAME}'
    env: '${SERVER_ENV}'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

scrape_configs:
  # Local node_exporter (using localhost because node_exporter uses host network)
  - job_name: 'node_exporter'
    static_configs:
      - targets: ['localhost:9100']
        labels:
          service: 'node_exporter'
          server: '${SERVER_NAME}'
          env: '${SERVER_ENV}'
          nodename: '${SERVER_NAME}'
          instance: '${SERVER_NAME}:9100'

